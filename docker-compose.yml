# Docker Compose para deploy (Hostinger / VPS).
# Variáveis sensíveis vêm do painel do provedor (env_file ou Environment Variables).
# Nada de segredos commitados.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: acia-semana-empresarial:latest
    container_name: acia-semana-empresarial
    restart: unless-stopped
    # Sem mapeamento "host:container" — o Hostinger Docker Manager faz
    # reverse proxy descobrindo o container pela rede interna.
    # Se você precisar acessar direto pelo host, troque `expose` por
    # `ports: ["3001:3000"]` (ou outra porta livre).
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # --- runtime (server-side) ---
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      EMAIL_SITE_URL: ${EMAIL_SITE_URL}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_API_URL: ${ASAAS_API_URL}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ZAI_API_KEY: ${ZAI_API_KEY}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
