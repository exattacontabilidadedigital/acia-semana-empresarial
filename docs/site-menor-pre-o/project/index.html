<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Semana Empresarial de Açailândia · 6ª Edição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* Responsive overrides */
  @media (max-width: 960px) {
    .hero-grid, .about-intro, .about-manifesto, .edition-detail, .map-split, .form-split, .tier-detail { grid-template-columns: 1fr !important; }
    .program-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .stats-grid, .pillars-grid, .tier-selector, .week-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .sponsor-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .photo-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .video-grid { grid-template-columns: 1fr !important; }
    .exhibitor-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .stat-row { grid-template-columns: 1fr 1fr !important; }
    .cta-band { padding: 48px 32px !important; }
  }
  @media (max-width: 640px) {
    .program-grid, .stats-grid, .pillars-grid, .tier-selector, .week-grid, .sponsor-grid, .exhibitor-grid, .photo-grid, .stat-row { grid-template-columns: 1fr !important; }
  }
  .photo-item:hover { transform: scale(1.01); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-sobre.jsx"></script>
<script type="text/babel" src="page-edicoes.jsx"></script>
<script type="text/babel" src="page-parceiros.jsx"></script>
<script type="text/babel" src="page-expositores.jsx"></script>
<script type="text/babel" src="page-inscricoes.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState(() => {
    return localStorage.getItem('se-page') || 'home';
  });

  useEffect(() => {
    localStorage.setItem('se-page', page);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [page]);

  const Page = {
    home: PageHome,
    sobre: PageSobre,
    edicoes: PageEdicoes,
    parceiros: PageParceiros,
    expositores: PageExpositores,
    inscricoes: PageInscricoes,
  }[page] || PageHome;

  return (
    <div data-screen-label={page}>
      <Nav page={page} setPage={setPage} />
      <main key={page}>
        <Page setPage={setPage} />
      </main>
      <Footer setPage={setPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
